[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "jbrowse-anywidget"
version = "0.2.0"
description = "JBrowse 2 linear genome view as an anywidget for notebooks"
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
license-files = ["LICENSE"]
keywords = ["jbrowse", "genomics", "genome-browser", "jupyter", "anywidget"]
classifiers = [
  "Framework :: Jupyter",
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering :: Bio-Informatics",
]
dependencies = ["anywidget>=0.9"]

[project.urls]
Homepage = "https://github.com/GMOD/jbrowse-anywidget"
Repository = "https://github.com/GMOD/jbrowse-anywidget"
Issues = "https://github.com/GMOD/jbrowse-anywidget/issues"

[project.optional-dependencies]
dev = ["pandas", "watchfiles", "pytest", "ruff"]
# what scripts/ needs on top of dev: nbformat builds examples/, bioframe
# generates the screenshot specs. Kept out of dev so CI installs neither.
scripts = ["nbformat", "bioframe"]

[tool.ruff]
# the floor from requires-python, so the linter flags 3.10+ syntax we can't use
target-version = "py39"
# examples/*.ipynb are generated by scripts/build_examples.py; lint the generator
exclude = ["examples"]

[tool.ruff.lint]
select = [
  "E",    # pycodestyle
  "F",    # pyflakes
  "W",    # whitespace
  "I",    # import sorting
  "UP",   # pyupgrade, bounded by target-version
  "B",    # bugbear
  "C4",   # comprehensions
  "SIM",  # simplify
  "PT",   # pytest style
  "PTH",  # pathlib over os.path
  "RET",  # returns
  "TC",   # typing-only imports behind TYPE_CHECKING
  "RUF",
]
ignore = [
  # this codebase nests rather than returning early, by house style
  "RET505",
  "RET506",
  # __all__ is grouped by concept (widgets, then builders, then helpers), which
  # reads better than alphabetical
  "RUF022",
]

[tool.ruff.lint.per-file-ignores]
# tests reach into the private helpers they cover
"tests/*" = ["SLF001"]
# the notebook cells this generates are string literals; wrapping them to 88
# would rewrap the generated notebooks
"scripts/build_examples.py" = ["E501"]

[tool.hatch.build]
# Ship the prebuilt JS bundle; never the JS toolchain.
artifacts = ["jbrowse_anywidget/static/**"]

[tool.hatch.build.targets.wheel]
packages = ["jbrowse_anywidget"]
